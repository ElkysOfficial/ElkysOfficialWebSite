name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Deploy to production? (yes/no)'
        required: true
        default: 'no'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .
        continue-on-error: false

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Build project
        run: npm run build

      - name: Analyze bundle size
        id: bundle
        run: |
          echo "📦 Analyzing bundle sizes..."
          TOTAL_SIZE=$(du -sh dist | cut -f1)
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT

          # Count files
          JS_COUNT=$(find dist/assets -name "*.js" 2>/dev/null | wc -l)
          CSS_COUNT=$(find dist/assets -name "*.css" 2>/dev/null | wc -l)
          echo "js_count=$JS_COUNT" >> $GITHUB_OUTPUT
          echo "css_count=$CSS_COUNT" >> $GITHUB_OUTPUT

          # Get largest JS file
          LARGEST_JS=$(du -h dist/assets/*.js 2>/dev/null | sort -hr | head -1 | awk '{print $1}' || echo "N/A")
          echo "largest_js=$LARGEST_JS" >> $GITHUB_OUTPUT

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: production-bundle-stats
          path: dist/
          retention-days: 30

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Send success notification
        if: success()
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          content: |
            ✅ **Deploy em Produção Concluído!**
            🚀 Commit: `${{ github.event.head_commit.message }}`
            👤 Por: ${{ github.actor }}
            🌐 Site: https://elys.com.br

            📦 **Bundle Info:**
            • Tamanho Total: ${{ steps.bundle.outputs.total_size }}
            • Arquivos JS: ${{ steps.bundle.outputs.js_count }}
            • Arquivos CSS: ${{ steps.bundle.outputs.css_count }}
            • Maior JS: ${{ steps.bundle.outputs.largest_js }}

      - name: Send failure notification
        if: failure()
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          content: |
            ❌ **Deploy em Produção Falhou!**
            🔴 Commit: `${{ github.event.head_commit.message }}`
            👤 Por: ${{ github.actor }}
            🔗 Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}