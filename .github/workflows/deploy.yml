name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Deploy to production? (yes/no)'
        required: true
        default: 'no'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .
        continue-on-error: false

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Build project
        run: npm run build

      - name: Analyze bundle size
        id: bundle
        run: |
          echo "📦 Analyzing bundle sizes..."
          TOTAL_SIZE=$(du -sh dist | cut -f1)
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT

          echo "### Bundle Analysis" > bundle-report.txt
          echo "**Total Size:** $TOTAL_SIZE" >> bundle-report.txt
          echo "" >> bundle-report.txt
          echo "**Largest Files:**" >> bundle-report.txt
          du -h dist/assets/*.js 2>/dev/null | sort -hr | head -5 >> bundle-report.txt || echo "No JS files found" >> bundle-report.txt

      - name: Run Lighthouse CI
        id: lighthouse
        run: |
          npx lhci autorun --upload.target=temporary-public-storage || echo "Lighthouse failed"

          if [ -f .lighthouseci/manifest.json ]; then
            PERF_SCORE=$(cat .lighthouseci/*.json | jq -r '.categories.performance.score * 100' | head -1)
            ACCESSIBILITY_SCORE=$(cat .lighthouseci/*.json | jq -r '.categories.accessibility.score * 100' | head -1)
            BEST_PRACTICES_SCORE=$(cat .lighthouseci/*.json | jq -r '.categories["best-practices"].score * 100' | head -1)
            SEO_SCORE=$(cat .lighthouseci/*.json | jq -r '.categories.seo.score * 100' | head -1)

            echo "perf_score=$PERF_SCORE" >> $GITHUB_OUTPUT
            echo "accessibility_score=$ACCESSIBILITY_SCORE" >> $GITHUB_OUTPUT
            echo "best_practices_score=$BEST_PRACTICES_SCORE" >> $GITHUB_OUTPUT
            echo "seo_score=$SEO_SCORE" >> $GITHUB_OUTPUT
          else
            echo "perf_score=N/A" >> $GITHUB_OUTPUT
            echo "accessibility_score=N/A" >> $GITHUB_OUTPUT
            echo "best_practices_score=N/A" >> $GITHUB_OUTPUT
            echo "seo_score=N/A" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: production-bundle-stats
          path: dist/
          retention-days: 30

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-lighthouse-results
          path: .lighthouseci/
          retention-days: 30

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Send success notification
        if: success()
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          content: |
            ✅ **Deploy em Produção Concluído!**
            🚀 Commit: `${{ github.event.head_commit.message }}`
            👤 Por: ${{ github.actor }}
            🌐 Site: https://elys.com.br

            📦 **Bundle Size:** ${{ steps.bundle.outputs.total_size }}

            🔍 **Lighthouse Scores:**
            ⚡ Performance: ${{ steps.lighthouse.outputs.perf_score }}%
            ♿ Accessibility: ${{ steps.lighthouse.outputs.accessibility_score }}%
            ✅ Best Practices: ${{ steps.lighthouse.outputs.best_practices_score }}%
            🔎 SEO: ${{ steps.lighthouse.outputs.seo_score }}%

      - name: Send failure notification
        if: failure()
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          content: |
            ❌ **Deploy em Produção Falhou!**
            🔴 Commit: `${{ github.event.head_commit.message }}`
            👤 Por: ${{ github.actor }}
            🔗 Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}