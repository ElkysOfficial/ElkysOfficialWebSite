name: Deploy to Staging

on:
  push:
    branches:
      - develop
      - staging
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint .
        continue-on-error: false

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: false

      - name: Build project
        run: npm run build

      - name: Analyze bundle size
        id: bundle
        run: |
          echo "📦 Analyzing bundle sizes..."
          TOTAL_SIZE=$(du -sh dist | cut -f1)
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT

          # Count files
          JS_COUNT=$(find dist/assets -name "*.js" 2>/dev/null | wc -l)
          CSS_COUNT=$(find dist/assets -name "*.css" 2>/dev/null | wc -l)
          echo "js_count=$JS_COUNT" >> $GITHUB_OUTPUT
          echo "css_count=$CSS_COUNT" >> $GITHUB_OUTPUT

          # Get largest JS file
          LARGEST_JS=$(du -h dist/assets/*.js 2>/dev/null | sort -hr | head -1 | awk '{print $1}' || echo "N/A")
          echo "largest_js=$LARGEST_JS" >> $GITHUB_OUTPUT

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        with:
          name: staging-bundle-stats
          path: dist/
          retention-days: 30

      - name: Comment PR with staging URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const bundleSize = '${{ steps.bundle.outputs.total_size }}';
            const jsCount = '${{ steps.bundle.outputs.js_count }}';
            const cssCount = '${{ steps.bundle.outputs.css_count }}';
            const largestJs = '${{ steps.bundle.outputs.largest_js }}';

            const comment = `✅ **Build completo! Preview estará disponível em staging após merge.**

            📦 **Bundle Info:**
            • Tamanho Total: ${bundleSize}
            • Arquivos JS: ${jsCount}
            • Arquivos CSS: ${cssCount}
            • Maior JS: ${largestJs}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })

      - name: Deploy to Staging (Hostinger)
        if: github.event_name == 'push'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME_STAGING }}
          password: ${{ secrets.FTP_PASSWORD_STAGING }}
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/staging/
          dangerous-clean-slate: false

      - name: Send staging success notification
        if: success() && github.event_name == 'push'
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          content: |
            🔵 **Deploy em Staging Concluído!**
            🚀 Commit: `${{ github.event.head_commit.message }}`
            👤 Por: ${{ github.actor }}
            🌐 Preview: https://staging.elys.com.br

            📦 **Bundle Info:**
            • Tamanho Total: ${{ steps.bundle.outputs.total_size }}
            • Arquivos JS: ${{ steps.bundle.outputs.js_count }}
            • Arquivos CSS: ${{ steps.bundle.outputs.css_count }}
            • Maior JS: ${{ steps.bundle.outputs.largest_js }}
