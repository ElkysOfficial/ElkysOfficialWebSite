<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Top arc -->
  <path d="M4.5 12 A7.5 7.5 0 0 1 19.5 12" stroke="currentColor" stroke-width="2.5"/>
  <!-- Arrowhead at right end of top arc -->
  <polygon points="17.8,9.8 21.2,9.8 19.5,13.5" fill="currentColor"/>

  <!-- Bottom arc (slightly transparent for depth) -->
  <path d="M19.5 12 A7.5 7.5 0 0 1 4.5 12" stroke="currentColor" stroke-width="2.5" opacity="0.6"/>
  <!-- Arrowhead at left end of bottom arc -->
  <polygon points="2.8,14.2 6.2,14.2 4.5,10.5" fill="currentColor" opacity="0.6"/>

  <!-- Center gear body -->
  <circle cx="12" cy="12" r="3.8" fill="currentColor"/>
  <!-- Gear teeth -->
  <rect x="15.6" y="11.1" width="1.6" height="1.8" rx="0.3" fill="currentColor"/>
  <rect x="6.8"  y="11.1" width="1.6" height="1.8" rx="0.3" fill="currentColor"/>
  <rect x="11.1" y="6.8"  width="1.8" height="1.6" rx="0.3" fill="currentColor"/>
  <rect x="11.1" y="15.6" width="1.8" height="1.6" rx="0.3" fill="currentColor"/>
</svg>
