<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Top arc (navy, clockwise: left → top → right) -->
  <path d="M4.5 12 A7.5 7.5 0 0 1 19.5 12" stroke="#1E3A5F" stroke-width="2.5"/>
  <!-- Arrowhead at right end of top arc, pointing downward -->
  <polygon points="17.8,9.8 21.2,9.8 19.5,13.5" fill="#1E3A5F"/>

  <!-- Bottom arc (cyan, clockwise: right → bottom → left) -->
  <path d="M19.5 12 A7.5 7.5 0 0 1 4.5 12" stroke="#20B6B6" stroke-width="2.5"/>
  <!-- Arrowhead at left end of bottom arc, pointing upward -->
  <polygon points="2.8,14.2 6.2,14.2 4.5,10.5" fill="#20B6B6"/>

  <!-- Center gear body (navy) -->
  <circle cx="12" cy="12" r="3.8" fill="#1E3A5F"/>
  <!-- Gear teeth at cardinal points (navy) -->
  <rect x="15.6" y="11.1" width="1.6" height="1.8" rx="0.3" fill="#1E3A5F"/>
  <rect x="6.8"  y="11.1" width="1.6" height="1.8" rx="0.3" fill="#1E3A5F"/>
  <rect x="11.1" y="6.8"  width="1.8" height="1.6" rx="0.3" fill="#1E3A5F"/>
  <rect x="11.1" y="15.6" width="1.8" height="1.6" rx="0.3" fill="#1E3A5F"/>

  <!-- Checkmark (cyan) -->
  <path d="M10 12 L11.5 13.9 L14.5 10.2" stroke="#20B6B6" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
