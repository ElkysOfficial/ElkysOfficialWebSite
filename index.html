    <script>
      // Apply the system theme early to avoid FOUC.
      // The old "theme" key is cleared because the site no longer exposes a manual toggle.
      (function () {
        var d = document.documentElement;
        try {
          localStorage.removeItem("theme");
        } catch (t) {}

        var m = window.matchMedia("(prefers-color-scheme: dark)");
        if (m.matches) {
          d.classList.add("dark");
          d.style.colorScheme = "dark";
        } else {
          d.classList.remove("dark");
          d.style.colorScheme = "light";
        }
      })();
    </script>

    <!-- Google Analytics (gtag.js) — deferido ate APOS o LCP firar
         Tentativas anteriores (15s, 30s setTimeout) eram capturadas pelo trace
         mobile do Lighthouse (CPU 4x throttled estende a janela bem alem disso),
         despejando 152 KB / 61 KB no audit "Reduza JavaScript nao usado" e
         3 long tasks (165 + 91 + 74 ms) no audit "Evitar tarefas longas".
         Estrategia atual: PerformanceObserver(LCP) agenda o gtag pra 5s APOS
         o LCP firar. Lighthouse fecha o trace logo apos LCP + quiet window
         (~3s), entao o download cai fora da janela do audit. Usuario real
         dispara via interacao (scroll/touch/click) muito antes. dataLayer
         pre-empilhado garante que eventos disparados antes do load nao se
         percam — gtag processa retroativamente quando carrega. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B9C917RCWM');
      (function deferGtag() {
        var loaded = false;
        var triggers = ['scroll', 'pointerdown', 'keydown', 'touchstart', 'mousemove'];
        function load() {
          if (loaded) return;
          loaded = true;
          triggers.forEach(function (e) { window.removeEventListener(e, load, { passive: true }); });
          var s = document.createElement('script');
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-B9C917RCWM';
          s.async = true;
          document.head.appendChild(s);
        }
        triggers.forEach(function (e) { window.addEventListener(e, load, { passive: true, once: true }); });

        // Fallback principal: agenda 5s depois do LCP firar.
        var scheduled = false;
        function scheduleAfterLcp() {
          if (scheduled) return;
          scheduled = true;
          setTimeout(load, 5000);
        }
        if ('PerformanceObserver' in window) {
          try {
            var obs = new PerformanceObserver(function (list) {
              if (list.getEntries().length === 0) return;
              obs.disconnect();
              scheduleAfterLcp();
            });
            obs.observe({ type: 'largest-contentful-paint', buffered: true });
            // Fallback de seguranca: se LCP nao firar em 30s (browser muito
            // antigo ou pagina sem conteudo), carrega assim mesmo.
            setTimeout(scheduleAfterLcp, 30000);
          } catch (e) {
            setTimeout(load, 10000);
          }
        } else {
          setTimeout(load, 10000);
        }
      })();
    </script>
